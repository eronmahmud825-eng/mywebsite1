<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeanLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0e1117;color:#e8eaf0;min-height:100vh}
    :root{--accent:#00d4aa;--danger:#ff5f72;--card:#161b26;--border:rgba(255,255,255,0.08)}
    .page{display:none;min-height:100vh}
    .page.show{display:block}

    /* SPLASH */
    #page-splash{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0f1a,#0e1a2e,#091a17);position:fixed;inset:0;z-index:999}
    .splash-box{text-align:center}
    .splash-title{font-size:2.5rem;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-1px}
    .splash-sub{color:rgba(255,255,255,0.4);font-size:0.9rem;margin-bottom:40px;letter-spacing:0.1em;text-transform:uppercase}
    .splash-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;margin:0 auto;overflow:hidden}
    .splash-bar{height:100%;width:0;background:var(--accent);border-radius:99px;transition:width 2.5s linear}

    /* ONBOARDING */
    #page-onboard{background:#0e1117;display:none;align-items:center;justify-content:center;padding:24px}
    #page-onboard.show{display:flex}
    .form-wrap{width:100%;max-width:420px}
    .form-wrap h1{font-size:1.8rem;font-weight:700;margin-bottom:6px}
    .form-wrap p{color:rgba(255,255,255,0.45);font-size:0.9rem;margin-bottom:28px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:0.75rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .inp-wrap{display:flex;align-items:center;background:#1c2333;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
    .inp-wrap:focus-within{border-color:var(--accent)}
    .inp-wrap input{flex:1;background:none;border:none;outline:none;color:#e8eaf0;padding:12px 14px;font-size:0.95rem;font-family:inherit;width:0}
    .inp-wrap input::placeholder{color:rgba(255,255,255,0.2)}
    .inp-wrap span{padding:0 12px;font-size:0.75rem;color:rgba(255,255,255,0.3);border-left:1px solid var(--border);white-space:nowrap}
    .plain-inp{width:100%;background:#1c2333;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:#e8eaf0;font-size:0.95rem;font-family:inherit;outline:none}
    .plain-inp:focus{border-color:var(--accent)}
    .plain-inp::placeholder{color:rgba(255,255,255,0.2)}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--accent);color:#031610;font-weight:700;font-size:1rem;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:8px}
    .btn:hover{background:#00efc0}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .err{color:var(--danger);font-size:0.82rem;margin-top:8px;min-height:18px}
    .info-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:12px 16px;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:20px;line-height:1.5}

    /* DASHBOARD */
    #page-dash{background:#0e1117;display:none}
    #page-dash.show{display:block}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;background:rgba(14,17,23,0.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
    .nav-brand{font-size:1.1rem;font-weight:700;color:var(--accent)}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-left:8px}
    .sync-dot.online{background:var(--accent);box-shadow:0 0 6px var(--accent)}
    .nav-out{background:none;border:1px solid var(--border);color:rgba(255,255,255,0.5);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.82rem}
    .nav-out:hover{color:#fff}
    .main{max-width:700px;margin:0 auto;padding:24px 16px 80px}
    .profile-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .ava{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#00b8ff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#031610;flex-shrink:0}
    .pname{font-size:1.1rem;font-weight:700}
    .pmeta{font-size:0.78rem;color:rgba(255,255,255,0.4);margin-top:2px}
    .badge{text-align:center;background:#1c2333;border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;min-width:100px}
    .badge-val{font-size:1.4rem;font-weight:800}
    .badge-lbl{font-size:0.65rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.07em}
    .loss .badge-val{color:var(--accent)}
    .gain .badge-val{color:var(--danger)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
    .sc.hi{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.2)}
    .sl{font-size:0.68rem;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
    .sv{font-size:1.15rem;font-weight:700}
    .sc.hi .sv{color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px}
    .card-title{font-size:1rem;font-weight:600;margin-bottom:4px}
    .card-sub{font-size:0.8rem;color:rgba(255,255,255,0.35);margin-bottom:18px}
    .inputs2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .save-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;background:var(--accent);color:#031610;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:0.95rem}
    .save-btn:hover{background:#00efc0}
    .save-btn:disabled{opacity:0.5;cursor:not-allowed}
    .hint{font-size:0.75rem;color:rgba(255,255,255,0.25);margin-top:8px}
    .toast{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--accent);font-size:0.82rem;font-weight:600;border-radius:99px;padding:5px 14px;margin-top:12px;opacity:0;transition:opacity 0.3s}
    .toast.show{opacity:1}
    .hist-title{font-size:1rem;font-weight:600;margin-bottom:14px}
    .empty{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.25);font-size:0.88rem;border:1px dashed var(--border);border-radius:12px}
    .trow{display:flex;gap:12px;margin-bottom:12px}
    .tl-side{display:flex;flex-direction:column;align-items:center;padding-top:18px}
    .tdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0}
    .tdot.first{background:var(--accent);box-shadow:0 0 8px var(--accent)}
    .tline{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:16px}
    .tcard{flex:1;background:#1c2333;border:1px solid var(--border);border-radius:12px;padding:14px 18px}
    .thead{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .tday{font-size:0.78rem;font-weight:700;color:var(--accent);background:rgba(0,212,170,0.1);border-radius:6px;padding:2px 8px}
    .tdate{font-size:0.75rem;color:rgba(255,255,255,0.35)}
    .tbody{display:flex;gap:24px;flex-wrap:wrap}
    .tm-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.3);margin-bottom:2px}
    .tm-val{font-size:0.95rem;font-weight:600}
    .ddown{color:var(--accent);font-size:0.75rem;font-weight:700;background:rgba(0,212,170,0.1);border-radius:4px;padding:1px 5px}
    .dup{color:var(--danger);font-size:0.75rem;font-weight:700;background:rgba(255,95,114,0.1);border-radius:4px;padding:1px 5px}
    @media(max-width:600px){
      .stats{grid-template-columns:1fr 1fr}
      .inputs2{grid-template-columns:1fr}
      .row2{grid-template-columns:1fr}
      .tbody{gap:14px}
    }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="page-splash">
  <div class="splash-box">
    <div class="splash-title">LeanLog</div>
    <div class="splash-sub">Your journey, measured.</div>
    <div class="splash-bar-wrap"><div class="splash-bar" id="sbar"></div></div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="page-onboard" class="page">
  <div class="form-wrap">
    <h1>Get started</h1>
    <p>Your data saves locally on this device and syncs to the cloud.</p>
    <div class="field">
      <label>Your name</label>
      <input class="plain-inp" type="text" id="f-name" placeholder="e.g. Eron" autocomplete="off"/>
    </div>
    <div class="row2">
      <div class="field">
        <label>Starting weight</label>
        <div class="inp-wrap"><input type="number" id="f-sw" placeholder="85.0" step="0.1" min="30" max="300"/><span>kg</span></div>
      </div>
      <div class="field">
        <label>Height</label>
        <div class="inp-wrap"><input type="number" id="f-ht" placeholder="175" step="1" min="100" max="250"/><span>cm</span></div>
      </div>
    </div>
    <div class="field">
      <label>Goal weight</label>
      <div class="inp-wrap"><input type="number" id="f-gw" placeholder="70.0" step="0.1" min="30" max="300"/><span>kg</span></div>
    </div>
    <button class="btn" id="btn-start"><span>Start tracking →</span></button>
    <div class="err" id="f-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="page-dash" class="page">
  <nav class="nav">
    <div class="nav-brand">LeanLog <span class="sync-dot" id="sync-dot"></span></div>
    <button class="nav-out" id="btn-logout">Sign out</button>
  </nav>
  <div class="main">
    <div class="profile-card">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="ava" id="d-ava">?</div>
        <div>
          <div class="pname" id="d-name">—</div>
          <div class="pmeta" id="d-meta">—</div>
        </div>
      </div>
      <div class="badge" id="d-badge">
        <div class="badge-val" id="d-delta">— kg</div>
        <div class="badge-lbl">net change</div>
      </div>
    </div>
    <div class="stats">
      <div class="sc"><div class="sl">Start</div><div class="sv" id="d-start">—</div></div>
      <div class="sc hi"><div class="sl">Current</div><div class="sv" id="d-cur">—</div></div>
      <div class="sc"><div class="sl">Goal</div><div class="sv" id="d-goal">—</div></div>
      <div class="sc"><div class="sl">Days</div><div class="sv" id="d-days">—</div></div>
    </div>
    <div class="card">
      <div class="card-title">Today's entry</div>
      <div class="card-sub" id="d-today-date">—</div>
      <div class="inputs2">
        <div class="field">
          <label>Weight</label>
          <div class="inp-wrap"><input type="number" id="t-w" placeholder="84.5" step="0.1" min="30" max="300"/><span>kg</span></div>
        </div>
        <div class="field">
          <label>Calories</label>
          <div class="inp-wrap"><input type="number" id="t-c" placeholder="1800" step="50" min="0" max="10000"/><span>kcal</span></div>
        </div>
      </div>
      <button class="save-btn" id="btn-save">✓ Save today</button>
      <div class="hint">Saves locally instantly, syncs to cloud when online</div>
      <div class="toast" id="toast">✓ <span id="toast-msg">Saved!</span></div>
    </div>
    <div class="hist-title">History</div>
    <div id="d-history"><div class="empty">No history yet.</div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STORAGE — localStorage first, Firebase second
// ═══════════════════════════════════════════════

var LS_USER = "ll_user";
var LS_ROWS = "ll_rows";

function lsGetUser()  { try { return JSON.parse(localStorage.getItem(LS_USER)); } catch(e){ return null; } }
function lsSetUser(u) { localStorage.setItem(LS_USER, JSON.stringify(u)); }
function lsGetRows()  { try { return JSON.parse(localStorage.getItem(LS_ROWS)) || []; } catch(e){ return []; } }
function lsSetRows(r) { localStorage.setItem(LS_ROWS, JSON.stringify(r)); }

function getUid() {
  var uid = localStorage.getItem("ll_uid");
  if (!uid) { uid = "u" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); localStorage.setItem("ll_uid", uid); }
  return uid;
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════

function todayKey() {
  var d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function niceDate(key) {
  var p = key.split("-").map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
}

// ═══════════════════════════════════════════════
//  PAGES
// ═══════════════════════════════════════════════

function goTo(id) {
  ["page-onboard","page-dash"].forEach(function(p){ document.getElementById(p).classList.remove("show"); });
  document.getElementById(id).classList.add("show");
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════

var user = null;
var rows = [];
var db   = null;
var fbOK = false;

// ═══════════════════════════════════════════════
//  SPLASH → START
// ═══════════════════════════════════════════════

window.onload = function() {
  setTimeout(function(){ document.getElementById("sbar").style.width = "100%"; }, 50);
  setTimeout(function(){
    document.getElementById("page-splash").style.display = "none";
    startApp();
  }, 3000);
};

function startApp() {
  // 1. Try to load from localStorage first (instant, always works)
  var saved = lsGetUser();
  if (saved) {
    user = saved;
    rows = lsGetRows();
    openDash();
  } else {
    goTo("page-onboard");
  }

  // 2. Try Firebase in background (non-blocking)
  tryFirebase();
}

function tryFirebase() {
  try {
    if (typeof firebase === "undefined") return;
    firebase.initializeApp({
      apiKey: "AIzaSyAcirrvSgPgb4zBkSMJg8G0WIqQdqqtOsM",
      authDomain: "consulate-d6691.firebaseapp.com",
      projectId: "consulate-d6691",
      storageBucket: "consulate-d6691.firebasestorage.app",
      messagingSenderId: "459011165720",
      appId: "1:459011165720:web:40d50df68038219f49fd6d"
    });
    db = firebase.firestore();
    // Enable offline persistence
    db.enablePersistence().catch(function(){});
    fbOK = true;
    setSyncDot(true);

    // If user already loaded from LS, sync from Firebase
    if (user) syncFromFirebase();
  } catch(e) {
    console.warn("Firebase unavailable:", e);
    fbOK = false;
    setSyncDot(false);
  }
}

function setSyncDot(online) {
  var dot = document.getElementById("sync-dot");
  if (!dot) return;
  dot.className = "sync-dot" + (online ? " online" : "");
}

// ═══════════════════════════════════════════════
//  FIREBASE SYNC (background, non-blocking)
// ═══════════════════════════════════════════════

function syncFromFirebase() {
  if (!fbOK || !db || !user) return;
  var uid = getUid();

  // Sync user profile
  db.collection("users").doc(uid).get().then(function(snap) {
    if (snap.exists) {
      user = Object.assign({ id: uid }, snap.data());
      lsSetUser(user);
      renderProfile();
    } else {
      // Push local user to Firebase
      db.collection("users").doc(uid).set({
        name: user.name,
        startWeight: user.startWeight,
        height: user.height,
        goalWeight: user.goalWeight
      }).catch(function(e){ console.warn("FB user push:", e); });
    }
  }).catch(function(e){ console.warn("FB user sync:", e); });

  // Sync entries
  db.collection("users").doc(uid).collection("entries")
    .orderBy("date","desc").get().then(function(snap) {
      if (snap.docs.length > 0) {
        rows = snap.docs.map(function(d){ return d.data(); });
        lsSetRows(rows);
        renderStats();
        renderHistory();
        fillTodayForm();
      } else {
        // Push local entries to Firebase
        rows.forEach(function(r) {
          db.collection("users").doc(uid).collection("entries")
            .doc(r.date).set(r).catch(function(){});
        });
      }
    }).catch(function(e){ console.warn("FB entries sync:", e); });
}

// ═══════════════════════════════════════════════
//  ONBOARDING
// ═══════════════════════════════════════════════

document.getElementById("btn-start").addEventListener("click", function() {
  var name = document.getElementById("f-name").value.trim();
  var sw   = parseFloat(document.getElementById("f-sw").value);
  var ht   = parseFloat(document.getElementById("f-ht").value);
  var gw   = parseFloat(document.getElementById("f-gw").value);
  var err  = document.getElementById("f-err");
  err.textContent = "";

  if (!name)             { err.textContent = "Enter your name.";           return; }
  if (isNaN(sw)||sw<30)  { err.textContent = "Enter a valid weight.";      return; }
  if (isNaN(ht)||ht<100) { err.textContent = "Enter a valid height.";      return; }
  if (isNaN(gw)||gw<30)  { err.textContent = "Enter a valid goal weight."; return; }

  // Save locally INSTANTLY — no waiting for Firebase
  user = { id: getUid(), name: name, startWeight: sw, height: ht, goalWeight: gw };
  rows = [];
  lsSetUser(user);
  lsSetRows(rows);

  // Open dashboard right away
  openDash();

  // Try to save to Firebase in background
  if (fbOK && db) {
    db.collection("users").doc(user.id).set({
      name: name, startWeight: sw, height: ht, goalWeight: gw
    }).catch(function(e){ console.warn("FB save user:", e); });
  }
});

// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════

function openDash() {
  goTo("page-dash");
  renderProfile();
  renderStats();
  renderHistory();
  fillTodayForm();
}

function renderProfile() {
  if (!user) return;
  document.getElementById("d-ava").textContent  = user.name.charAt(0).toUpperCase();
  document.getElementById("d-name").textContent = user.name;
  var bmi = (user.startWeight / Math.pow(user.height/100, 2)).toFixed(1);
  document.getElementById("d-meta").textContent = user.height + " cm · BMI " + bmi + " at start";
  document.getElementById("d-start").textContent = user.startWeight + " kg";
  document.getElementById("d-goal").textContent  = user.goalWeight  + " kg";
}

function renderStats() {
  document.getElementById("d-days").textContent = rows.length;
  var latest = rows.find(function(r){ return r.weight; });
  var cw = latest ? latest.weight : (user ? user.startWeight : 0);
  document.getElementById("d-cur").textContent = cw + " kg";
  if (!user) return;
  var delta = +(cw - user.startWeight).toFixed(1);
  document.getElementById("d-delta").textContent = (delta > 0 ? "+" : "") + delta + " kg";
  var badge = document.getElementById("d-badge");
  badge.className = "badge " + (delta < 0 ? "loss" : delta > 0 ? "gain" : "");
}

function renderHistory() {
  var today = todayKey();
  var past  = rows.filter(function(r){ return r.date !== today; });
  var cont  = document.getElementById("d-history");
  if (!past.length) {
    cont.innerHTML = '<div class="empty">No past entries yet. Today\'s entry appears here tomorrow.</div>';
    return;
  }
  var asc = past.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  cont.innerHTML = past.map(function(r, idx) {
    var ai  = asc.findIndex(function(x){ return x.date === r.date; });
    var pw  = ai > 0 ? (asc[ai-1].weight || user.startWeight) : user.startWeight;
    var dv  = r.weight != null ? +(r.weight - pw).toFixed(1) : null;
    var ds  = dv != null ? '<span class="'+(dv<=0?"ddown":"dup")+'">'+(dv>0?"+":"")+dv+" kg</span>" : "";
    var isF = idx === past.length - 1;
    return '<div class="trow">'+
      '<div class="tl-side"><div class="tdot'+(isF?" first":"")+'"></div>'+(isF?"":'<div class="tline"></div>')+'</div>'+
      '<div class="tcard">'+
        '<div class="thead"><span class="tday">Day '+(ai+1)+'</span><span class="tdate">'+niceDate(r.date)+'</span></div>'+
        '<div class="tbody">'+
          '<div><div class="tm-label">Weight</div><div class="tm-val">'+(r.weight!=null?r.weight+" kg":"—")+" "+ds+'</div></div>'+
          '<div><div class="tm-label">Calories</div><div class="tm-val">'+(r.calories!=null?r.calories.toLocaleString()+" kcal":"—")+'</div></div>'+
        '</div>'+
      '</div></div>';
  }).join("");
}

function fillTodayForm() {
  var today = todayKey();
  document.getElementById("d-today-date").textContent = niceDate(today);
  var te = rows.find(function(r){ return r.date === today; });
  if (te) {
    if (te.weight   != null) document.getElementById("t-w").value = te.weight;
    if (te.calories != null) document.getElementById("t-c").value = te.calories;
  }
}

// ═══════════════════════════════════════════════
//  SAVE TODAY
// ═══════════════════════════════════════════════

document.getElementById("btn-save").addEventListener("click", function() {
  var w = parseFloat(document.getElementById("t-w").value);
  var c = parseFloat(document.getElementById("t-c").value);
  if (isNaN(w) && isNaN(c)) { showToast("Enter weight or calories first."); return; }

  var today  = todayKey();
  var past   = rows.filter(function(r){ return r.date < today; });
  var exists = rows.find(function(r){ return r.date === today; });
  var dayNum = exists ? (exists.dayNumber || past.length + 1) : past.length + 1;

  var data = {
    date:      today,
    weight:    isNaN(w) ? null : w,
    calories:  isNaN(c) ? null : c,
    dayNumber: dayNum
  };

  // Save to localStorage INSTANTLY
  var i = rows.findIndex(function(r){ return r.date === today; });
  if (i >= 0) rows[i] = Object.assign({}, rows[i], data);
  else        rows.unshift(data);
  lsSetRows(rows);

  renderStats();
  renderHistory();
  showToast("Saved!");

  // Try Firebase in background
  if (fbOK && db && user) {
    db.collection("users").doc(user.id).collection("entries")
      .doc(today).set(data, { merge: true })
      .then(function(){ setSyncDot(true); })
      .catch(function(e){ console.warn("FB entry save:", e); setSyncDot(false); });
  }
});

function showToast(msg) {
  document.getElementById("toast-msg").textContent = msg;
  var t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ═══════════════════════════════════════════════
//  LOGOUT
// ═══════════════════════════════════════════════

document.getElementById("btn-logout").addEventListener("click", function() {
  if (!confirm("Sign out? Your data stays saved on this device.")) return;
  localStorage.removeItem("ll_uid");
  localStorage.removeItem(LS_USER);
  localStorage.removeItem(LS_ROWS);
  user = null; rows = [];
  ["f-name","f-sw","f-ht","f-gw"].forEach(function(id){ document.getElementById(id).value = ""; });
  document.getElementById("f-err").textContent = "";
  goTo("page-onboard");
});
</script>
